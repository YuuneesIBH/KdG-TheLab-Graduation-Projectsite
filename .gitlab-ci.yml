create-pages:
  stage: deploy
  script:
    - mkdir -p public
    - cp index.html public/
    - cp project.html public/
    - cp team.html public/
    - cp materiaal.html public/
    - cp theme.css public/
    - cp theme.js public/
    - cp thearcaders_logo_cropped.png public/
  artifacts:
    paths:
      - public
  pages: true
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
